openapi: 3.0.3
info:
  title: Weather and Supply Chain Risk API
  version: 1.0.0
  description: >
    OpenAPI contract for the weather ingestion, retrieval, processing, and risk
    analytics endpoints exposed through API Gateway HTTP API and backed by AWS
    Lambda. Parameter presence and format validation are enforced by the backend
    service rather than API Gateway. The live deployment currently includes the
    retrieval, ingestion, processing, and risk-by-location endpoints. The
    region-risk endpoint remains pending implementation.
servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    description: AWS API Gateway deployment
    variables:
      apiId:
        default: your-api-id
      region:
        default: ap-southeast-2
      stage:
        default: dev
tags:
  - name: Location microservice
  - name: Data collection microservice
  - name: Data retrieval microservice
  - name: Data processing microservice
  - name: Analytics microservice
  - name: Watchlist microservice
paths:
  /ese/v1/location:
    post:
      tags:
        - Location microservice
      summary: Create a shared dynamic hub
      description: >
        Creates a shared dynamic `LOC_*` hub from latitude, longitude, and name.
        Requires a valid Cognito ID token in the Authorization header.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lat
                - lon
                - name
              properties:
                lat:
                  type: number
                lon:
                  type: number
                name:
                  type: string
      responses:
        '200':
          description: Dynamic hub created or existing matching hub returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hub_id:
                    type: string
        '400':
          description: Invalid input body or coordinates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/location/list:
    get:
      tags:
        - Location microservice
      summary: List dynamic and monitored hubs
      description: >
        Lists all hubs by default. Supports filtering by type and truncating the
        returned list with `limit`.
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [dynamic, monitored]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Matching hubs sorted by hub ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hubs:
                    type: array
                    items:
                      $ref: '#/components/schemas/HubSummary'
        '400':
          description: Invalid query parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/location/{hub_id}:
    get:
      tags:
        - Location microservice
      summary: Fetch a hub by ID
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
      responses:
        '200':
          description: Hub details for a monitored or dynamic hub.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HubDetail'
        '404':
          description: Hub not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/ingest/weather/{hub_id}:
    post:
      tags:
        - Data collection microservice
      summary: Ingest weather forecast for a hub
      description: >
        Resolves latitude and longitude from `hub_id`, fetches the next week's
        weather forecast from Pirate Weather, and stores the raw data in the
        datalake using a date string derived from the UNIX timestamp. The
        backend validates `hub_id`.
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
      responses:
        '200':
          description: Weather forecast was fetched and stored successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                success:
                  value:
                    message: Success
        '400':
          description: Invalid hub ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/retrieve/raw/weather/{hub_id}:
    get:
      tags:
        - Data retrieval microservice
      summary: Retrieve raw Pirate Weather payload for a hub and date
      description: >
        Reads raw weather data from the datalake for the specified hub and date.
        The backend validates both `hub_id` and the `DD-MM-YYYY` date format.
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
        - $ref: '#/components/parameters/DateQuery'
      responses:
        '200':
          description: Raw Pirate Weather JSON response for the requested date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawWeatherResponse'
        '400':
          description: Invalid hub ID or missing/invalid date. `date` must be `DD-MM-YYYY`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Raw weather data was not found for the given hub and date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/retrieve/processed/weather/{hub_id}:
    get:
      tags:
        - Data retrieval microservice
      summary: Retrieve processed weather payload for a hub and date
      description: >
        Reads processed weather data from the datalake for the specified hub and
        date using the ML model input schema. The backend validates both
        `hub_id` and the `DD-MM-YYYY` date format.
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
        - $ref: '#/components/parameters/DateQuery'
      responses:
        '200':
          description: Processed weather data in the ML model input schema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessedWeatherResponse'
        '400':
          description: Invalid hub ID or missing/invalid date. `date` must be `DD-MM-YYYY`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Processed weather data was not found for the given hub and date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/process/weather:
    post:
      tags:
        - Data processing microservice
      summary: Process raw weather data into 6-hour forecast objects
      description: >
        Processes raw weather data for a given date by extracting hourly forecast
        entries and producing separate processed objects every 6 hours for the
        next 7 days. Existing processed objects for the same date are
        overwritten. Request-body validation is handled by the backend service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessWeatherRequest'
      responses:
        '200':
          description: Processed weather objects created successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                success:
                  value:
                    message: Data processed successfully for H001
                    processed_data: '{"hub_id":"H001"}'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/watchlist:
    get:
      tags:
        - Watchlist microservice
      summary: List the authenticated user's watchlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user's watched hubs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/watchlist/{hub_id}:
    post:
      tags:
        - Watchlist microservice
      summary: Add a hub to the authenticated user's watchlist
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
      responses:
        '200':
          description: Watchlist entry added or already present.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid hub ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user does not have a verified email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Watchlist microservice
      summary: Remove a hub from the authenticated user's watchlist
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
      responses:
        '200':
          description: Watchlist entry removed or already absent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid hub ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user does not have a verified email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/risk/region:
    get:
      tags:
        - Analytics microservice
      summary: Pending region risk endpoint
      description: >
        This route is part of the intended public API contract, but it is not
        implemented or deployed live yet.
      parameters:
        - name: region
          in: query
          required: true
          schema:
            type: string
      responses:
        '501':
          description: Route not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ese/v1/risk/location/{hub_id}:
    get:
      tags:
        - Analytics microservice
      summary: Retrieve the latest risk score for a hub
      description: >
        Returns the cached latest risk payload for the specified hub when
        available, otherwise computes it from processed weather data. The
        backend validates `hub_id`, and `date` is optional for on-demand
        computation.
      parameters:
        - $ref: '#/components/parameters/HubIdPath'
        - $ref: '#/components/parameters/OptionalDateQuery'
      responses:
        '200':
          description: Latest risk assessment payload for the hub.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskLocationResponse'
        '400':
          description: Invalid hub ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    HubIdPath:
      name: hub_id
      in: path
      required: true
      description: Unique identifier for the supply chain hub.
      schema:
        type: string
      example: HUB123
    DateQuery:
      name: date
      in: query
      required: true
      description: Target date in `DD-MM-YYYY` format.
      schema:
        type: string
        pattern: '^\d{2}-\d{2}-\d{4}$'
      example: 08-03-2026
    OptionalDateQuery:
      name: date
      in: query
      required: false
      description: Optional target date in `DD-MM-YYYY` format.
      schema:
        type: string
        pattern: '^\d{2}-\d{2}-\d{4}$'
      example: 08-03-2026

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid date format. Use DD-MM-YYYY
    HubSummary:
      type: object
      properties:
        hub_id:
          type: string
        name:
          type: string
        lat:
          type: number
        lon:
          type: number
    HubDetail:
      allOf:
        - $ref: '#/components/schemas/HubSummary'
        - type: object
          properties:
            type:
              type: string
              enum: [dynamic, monitored]
    WatchlistEntry:
      type: object
      properties:
        hub_id:
          type: string
        notification_email:
          type: string
          format: email
        created_at:
          type: string
    WatchlistResponse:
      type: object
      properties:
        hubs:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistEntry'
    RawWeatherResponse:
      type: object
      description: Placeholder schema for the raw Pirate Weather API payload.
      additionalProperties: true
    ProcessWeatherRequest:
      type: object
      required:
        - raw_data
      properties:
        raw_data:
          type: object
          description: Raw Pirate Weather payload to process.
          additionalProperties: true
    ProcessedWeatherResponse:
      type: object
      description: Placeholder schema for processed weather objects matching the ML model input.
      additionalProperties: true
      example:
        hub_id: HUB123
        generated_at: 08-03-2026
        forecast_windows:
          - timestamp: 1741392000
            date: 08-03-2026
            risk_score: 42

    RiskLocationResponse:
      type: object
      additionalProperties: true
      example:
        dataset_type: Supply Chain Disruption Risk Assessment
        events:
          - event_type: daily_risk_assessment
            attribute:
              hub_id: H001
              peak_risk_score: 0.42
              risk_level: High
