name: Terraform CI

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/**"
      - "docs/openapi.yaml"
      - "hubs.json"
      - "lambdas/**"
      - "models/**"
      - "scripts/**"
      - "tests/data/**"
      - "**/*.py"
      - "**/pyproject.toml"
      - "**/requirements*.txt"
      - "**/pytest.ini"
      - "**/.coveragerc"
      - "**/mypy.ini"
      - "**/.flake8"
  push:
    branches-ignore:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"
      - "docs/openapi.yaml"
      - "hubs.json"
      - "lambdas/**"
      - "models/**"
      - "scripts/**"
      - "tests/data/**"
      - "**/*.py"
      - "**/pyproject.toml"
      - "**/requirements*.txt"
      - "**/pytest.ini"
      - "**/.coveragerc"
      - "**/mypy.ini"
      - "**/.flake8"

permissions:
  contents: read

jobs:
  detect-python:
    name: Detect Python project
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      project_dir: ${{ steps.detect.outputs.project_dir }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Python files
        id: detect
        run: |
          set -euo pipefail

          project_dir=""

          while IFS= read -r file; do
            candidate="$(dirname "$file")"
            project_dir="${candidate#./}"
            if [ -z "$project_dir" ]; then
              project_dir="."
            fi
            break
          done < <(find . -path './.git' -prune -o -path './terraform/.terraform' -prune -o \( -name 'pyproject.toml' -o -name 'requirements.txt' -o -name 'requirements-dev.txt' \) -print | sort)

          if [ -z "$project_dir" ] && find . -path './.git' -prune -o -path './terraform/.terraform' -prune -o -name '*.py' -print | grep -q .; then
            project_dir="."
          fi

          if [ -n "$project_dir" ]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
            echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          fi

  static-checks:
    name: Static Terraform and OpenAPI checks
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Build Lambda artifacts
        run: bash ./scripts/build_lambda_artifacts.sh

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Parse OpenAPI YAML
        run: |
          ruby -e 'require "yaml"; data = YAML.load_file("docs/openapi.yaml"); abort("missing openapi key") unless data["openapi"]'

  python-quality:
    name: Python lint, types, tests, and coverage
    runs-on: ubuntu-latest
    needs: detect-python
    if: ${{ needs.detect-python.outputs.has_python == 'true' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies and tooling
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip wheel

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi

          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          fi

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy type check
        env:
          PYTHONPATH: ${{ needs.detect-python.outputs.project_dir }}
        run: python -m mypy .

      - name: Pytest (unit tests) with coverage
        env:
          PYTHONPATH: ${{ needs.detect-python.outputs.project_dir }}
        run: python -m pytest tests/unit --cov=lambdas --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Build Lambda artifacts
        run: bash ./scripts/build_lambda_artifacts.sh

system-tests:
    name: system tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      DEV_BASE_URL: ${{ vars.DEV_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run system tests
        run: python -m pytest tests/system