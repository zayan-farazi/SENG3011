name: Terraform CI

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/**"
      - "**/*.py"
      - "**/pyproject.toml"
      - "**/requirements*.txt"
      - "**/pytest.ini"
      - "**/.coveragerc"
      - "**/mypy.ini"
      - "**/.flake8"
  push:
    branches-ignore:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"
      - "**/*.py"
      - "**/pyproject.toml"
      - "**/requirements*.txt"
      - "**/pytest.ini"
      - "**/.coveragerc"
      - "**/mypy.ini"
      - "**/.flake8"

permissions:
  contents: read
  id-token: write

jobs:
  detect-python:
    name: Detect Python project
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      project_dir: ${{ steps.detect.outputs.project_dir }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Python files
        id: detect
        run: |
          set -euo pipefail

          project_dir=""

          while IFS= read -r file; do
            candidate="$(dirname "$file")"
            project_dir="${candidate#./}"
            if [ -z "$project_dir" ]; then
              project_dir="."
            fi
            break
          done < <(find . -path './.git' -prune -o -path './terraform/.terraform' -prune -o \( -name 'pyproject.toml' -o -name 'requirements.txt' -o -name 'requirements-dev.txt' \) -print | sort)

          if [ -z "$project_dir" ] && find . -path './.git' -prune -o -path './terraform/.terraform' -prune -o -name '*.py' -print | grep -q .; then
            project_dir="."
          fi

          if [ -n "$project_dir" ]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
            echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          fi

  static-checks:
    name: Static Terraform and OpenAPI checks
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Parse OpenAPI YAML
        run: |
          ruby -e 'require "yaml"; data = YAML.load_file("terraform/weather-api.openapi.yaml"); abort("missing openapi key") unless data["openapi"]'

  python-quality:
    name: Python lint, types, tests, and coverage
    runs-on: ubuntu-latest
    needs: detect-python
    if: ${{ needs.detect-python.outputs.has_python == 'true' }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ needs.detect-python.outputs.project_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies and tooling
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip wheel
          python -m pip install -r ./SENG3011/requirements-dev.txt

          if [ -f ./SENG3011/requirements.txt ]; then
            python -m pip install -r ./SENG3011/requirements.txt
          fi

          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          fi

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy type check
        env:
          PYTHONPATH: ${{ needs.detect-python.outputs.project_dir }}
        run: python -m mypy .

      - name: Pytest (unit tests) with coverage
        env:
          PYTHONPATH: ${{ needs.detect-python.outputs.project_dir }}
        run: python -m pytest tests/unit --cov=lambdas --cov-report=term-missing --cov-report=xml --cov-fail-under=85

  plan-dev:
    name: Terraform plan against dev
    runs-on: ubuntu-latest
    needs: [static-checks, python-quality]
    environment: dev
    if: ${{ vars.AWS_ROLE_ARN != '' && vars.TF_STATE_BUCKET != '' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY != '' && vars.TF_STATE_KEY || 'dev/terraform.tfstate' }}
      ENABLE_LAMBDA_INTEGRATIONS: ${{ vars.ENABLE_LAMBDA_INTEGRATIONS }}
      LAMBDA_BINDINGS_JSON: ${{ vars.TF_VAR_lambda_bindings }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"

      - name: Terraform plan
        run: |
          export TF_VAR_aws_region="${AWS_REGION}"
          export TF_VAR_enable_lambda_integrations="${ENABLE_LAMBDA_INTEGRATIONS:-false}"

          if [ -n "${LAMBDA_BINDINGS_JSON}" ]; then
            export TF_VAR_lambda_bindings="${LAMBDA_BINDINGS_JSON}"
          fi

          terraform -chdir=terraform plan -refresh=false -input=false -no-color
