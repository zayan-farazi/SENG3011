name: Terraform Deploy Staging

on:
  push:
    branches-ignore:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"
      - "docs/openapi.yaml"
      - "hubs.json"
      - "lambdas/**"
      - "models/**"
      - "scripts/**"
      - "tests/data/**"
      - "**/*.py"
      - "**/requirements*.txt"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Apply Terraform to staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-2' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY != '' && vars.TF_STATE_KEY || 'staging/terraform.tfstate' }}
      DATA_BUCKET_NAME: ${{ vars.TF_VAR_data_bucket_name }}
      PIRATE_WEATHER_API_KEY: ${{ secrets.PIRATE_WEATHER_API_KEY }}
      TF_ENVIRONMENT_NAME: staging
      TF_STAGE_NAME: staging

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check required GitHub environment variables
        run: |
          test -n "${{ vars.AWS_ROLE_ARN }}"
          test -n "$TF_STATE_BUCKET"
          test -n "$DATA_BUCKET_NAME"
          test -n "$PIRATE_WEATHER_API_KEY"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Build Lambda artifacts
        run: bash ./scripts/build_lambda_artifacts.sh

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"

      - name: Terraform apply
        run: |
          export TF_VAR_aws_region="${AWS_REGION}"
          export TF_VAR_data_bucket_name="${DATA_BUCKET_NAME}"
          export TF_VAR_pirate_weather_api_key="${PIRATE_WEATHER_API_KEY}"
          export TF_VAR_environment_name="${TF_ENVIRONMENT_NAME}"
          export TF_VAR_stage_name="${TF_STAGE_NAME}"

          terraform -chdir=terraform apply -auto-approve -input=false -no-color

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run system tests against deployed staging stack
        run: |
          # Use the deployed base URL from Terraform output rather than a fixed repo variable.
          export DEV_BASE_URL="$(terraform -chdir=terraform output -raw base_invoke_url)"
          python -m pytest tests/system -q
