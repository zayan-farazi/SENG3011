name: Combined Quality Report

on:
  workflow_run:
    workflows:
      - Terraform Deploy Staging
    types:
      - completed
  workflow_dispatch:
    inputs:
      staging_run_id:
        description: Staging workflow run ID to source staging test artifacts from
        required: true
      ci_run_id:
        description: Optional CI workflow run ID to source CI artifacts from
        required: false
      ref:
        description: Branch, tag, or SHA to check out for report generation
        required: false
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  combine:
    name: Build final test and coverage reports
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reporting dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install xhtml2pdf
          mkdir -p reporting/final

      - name: Download staging metadata
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ github.event_name == 'workflow_dispatch' && inputs.staging_run_id || github.event.workflow_run.id }}
          name: staging-test-results
          path: reporting/staging

      - name: Read CI run id from staging metadata
        id: metadata
        run: |
          metadata_ci_run_id=$(awk -F= '/^ci_run_id=/{print $2}' reporting/staging/staging-report-metadata.txt)
          metadata_head_sha=$(awk -F= '/^head_sha=/{print $2}' reporting/staging/staging-report-metadata.txt)
          ci_run_id="${{ inputs.ci_run_id || '' }}"
          head_sha="${{ inputs.ref || '' }}"

          if [ -z "$ci_run_id" ]; then
            ci_run_id="$metadata_ci_run_id"
          fi

          if [ -z "$head_sha" ]; then
            head_sha="$metadata_head_sha"
          fi

          if [ -z "$ci_run_id" ]; then
            echo "Missing ci_run_id in staging metadata"
            exit 1
          fi
          if [ -z "$head_sha" ]; then
            echo "Missing head_sha in staging metadata"
            exit 1
          fi
          echo "ci_run_id=$ci_run_id" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.metadata.outputs.head_sha }}

      - name: Download CI coverage data
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ steps.metadata.outputs.ci_run_id }}
          name: ci-coverage-data
          path: reporting/ci

      - name: Download CI test results
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ steps.metadata.outputs.ci_run_id }}
          name: ci-test-results
          path: reporting/ci

      - name: Reuse CI coverage data
        run: |
          cp reporting/ci/coverage.xml reporting/final/coverage.xml
          cp -R reporting/ci/htmlcov reporting/final/htmlcov

      - name: Generate final HTML and PDF reports
        run: |
          python scripts/generate_combined_report.py \
            --ci-dir reporting/ci \
            --staging-dir reporting/staging \
            --output-dir reporting/final

      - name: Upload final PDF reports
        uses: actions/upload-artifact@v4
        with:
          name: final-report-pdfs
          path: reporting/final/

      - name: Upload final raw reports
        uses: actions/upload-artifact@v4
        with:
          name: final-report-data
          path: reporting/final/
