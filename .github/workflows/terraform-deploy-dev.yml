name: Terraform Deploy Dev
on:
  workflow_run:
    workflows:
      - Terraform CI
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Apply Terraform to dev
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'ap-southeast-2' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY != '' && vars.TF_STATE_KEY || 'dev/terraform.tfstate' }}
      DATA_BUCKET_NAME: ${{ vars.TF_VAR_data_bucket_name }}
      PIRATE_WEATHER_API_KEY: ${{ secrets.PIRATE_WEATHER_API_KEY }}
      TF_ENVIRONMENT_NAME: dev
      TF_STAGE_NAME: dev

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check required GitHub environment variables
        run: |
          test -n "${{ vars.AWS_ROLE_ARN }}"
          test -n "$TF_STATE_BUCKET"
          test -n "$DATA_BUCKET_NAME"
          test -n "$PIRATE_WEATHER_API_KEY"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Build Lambda artifacts
        run: bash ./scripts/build_lambda_artifacts.sh

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"

      - name: Terraform apply
        run: |
          export TF_VAR_aws_region="${AWS_REGION}"
          export TF_VAR_data_bucket_name="${DATA_BUCKET_NAME}"
          export TF_VAR_pirate_weather_api_key="${PIRATE_WEATHER_API_KEY}"
          export TF_VAR_environment_name="${TF_ENVIRONMENT_NAME}"
          export TF_VAR_stage_name="${TF_STAGE_NAME}"

          terraform -chdir=terraform apply -auto-approve -input=false -no-color
