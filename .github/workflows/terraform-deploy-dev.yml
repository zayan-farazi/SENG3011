name: Terraform Deploy Dev

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply Terraform to dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY != '' && vars.TF_STATE_KEY || 'dev/terraform.tfstate' }}
      ENABLE_LAMBDA_INTEGRATIONS: ${{ vars.ENABLE_LAMBDA_INTEGRATIONS }}
      LAMBDA_BINDINGS_JSON: ${{ vars.TF_VAR_lambda_bindings }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check required GitHub environment variables
        run: |
          test -n "${{ vars.AWS_ROLE_ARN }}"
          test -n "$TF_STATE_BUCKET"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"

      - name: Terraform apply
        run: |
          export TF_VAR_aws_region="${AWS_REGION}"
          export TF_VAR_enable_lambda_integrations="${ENABLE_LAMBDA_INTEGRATIONS:-false}"

          if [ -n "${LAMBDA_BINDINGS_JSON}" ]; then
            export TF_VAR_lambda_bindings="${LAMBDA_BINDINGS_JSON}"
          fi

          terraform -chdir=terraform apply -auto-approve -input=false -no-color
